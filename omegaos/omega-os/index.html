<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#010304" />
    <title>Omega</title>
  </head>
  <body>
    <main id="omega-os" aria-label="Omega OS">
      <div id="r3f-root" aria-hidden="true"></div>
      <canvas id="omega-canvas" aria-hidden="true"></canvas>
      <div id="ui-root" aria-live="polite">
        <section class="summon-panel login-panel" id="login-panel" aria-label="Omega sign in" hidden>
          <div class="drag-zone"></div>
          <p class="panel-copy">Sign in to speak with Omega from this room.</p>
          <form class="login-grid" method="post" action="/login">
            <label>Name<input name="username" autocomplete="username" /></label>
            <label>Password<input name="password" type="password" autocomplete="current-password" /></label>
            <div class="panel-actions">
              <button type="submit">Enter</button>
              <a href="/login">Create account</a>
            </div>
          </form>
        </section>
        <section class="summon-panel chat-panel" id="chat-panel" aria-label="Omega chat" hidden>
          <div class="drag-zone"></div>
          <div class="transcript" id="transcript"></div>
          <form class="chat-form" id="chat-form">
            <textarea id="chat-input" rows="2" aria-label="Message Omega"></textarea>
            <button type="submit" aria-label="Send message"></button>
          </form>
        </section>
        <section class="summon-panel atom-panel" id="atom-panel" aria-label="Omega atom" hidden>
          <div class="drag-zone"></div>
          <div class="atom-meta" id="atom-meta"></div>
          <pre class="atom-label" id="atom-label"></pre>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
